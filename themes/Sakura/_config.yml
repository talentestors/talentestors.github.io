rss: /atom.xml

# offline config passed to sw-precache.
service_worker:
  maximumFileSizeToCacheInBytes: 5242880
  staticFileGlobs:
  - public/**/*.{js,html,css,png,jpg,gif,svg,eot,ttf,woff,woff2}
  stripPrefix: public
  verbose: true
  runtimeCaching:
      - urlPattern: /*
        handler: cacheFirst
        options:
          origin: fastly.jsdelivr.net
      - urlPattern: /*
        handler: cacheFirst
        options:
          origin: gcore.jsdelivr.net
      - urlPattern: /*
        handler: cacheFirst
        options:
          origin: cdnjs.cloudflare.com

# Sakura effect
sakura:
